name: Refresh EDGAR data

# Runs daily and on manual trigger. Scrapes SEC EDGAR, commits the updated
# dataset, which triggers a Vercel redeploy automatically.
on:
  schedule:
    - cron: "30 6 * * *" # 06:30 UTC daily
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r scraper/requirements.txt

      - name: Run scraper
        env:
          # SEC requires a descriptive User-Agent with a contact address.
          SEC_USER_AGENT: ${{ secrets.SEC_USER_AGENT }}
        run: python scraper/scrape.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/filings.json public/data/filings.csv
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: refresh EDGAR filings data"
            git push
          fi
